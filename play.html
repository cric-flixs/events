<style>

html,body{
margin:0;
padding:0;
background:#000;
width:100vw;
height:100dvh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

/* PLAYER FIT SCREEN WITHOUT SCROLL */
#player{
width:100vw;
height:100dvh;
max-width:100%;
max-height:100%;
position:relative;
}

/* remove quality menu */
.jw-settings-menu .jw-settings-submenu-quality{
display:none !important;
}

.jw-settings-content-item[data-type="quality"]{
display:none !important;
}

/* custom button */
.jw-icon-aspect{
background-size:contain;
}

/* ===== LOGO CONTROL ===== */
:root{

--logo-top:20px;
--logo-left:20px;
--logo-size:90px;

}

/* LOGO STYLE */

.player-logo{

position:absolute;
top:var(--logo-top);
left:var(--logo-left);

width:var(--logo-size);
height:auto;

z-index:999999;

pointer-events:none;

}

/* mobile auto adjust */

@media (max-width:768px){

:root{
--logo-size:60px;
}

}

</style>
